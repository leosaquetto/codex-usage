name: Codex Usage Trigger Email

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: codex-usage-trigger-email
  cancel-in-progress: true

jobs:
  trigger-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read usage and send email if active
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_RECEIVE: ${{ secrets.MAIL_RECEIVE }}
        run: |
          set -euo pipefail

          if [[ -z "${MAIL_USERNAME}" || -z "${MAIL_PASSWORD}" || -z "${MAIL_RECEIVE}" ]]; then
            echo "Required secrets are missing."
            exit 1
          fi

          value="$(python - <<'PY'
import json
with open("codex_usage.json", "r", encoding="utf-8") as f:
    data = json.load(f)
print(data.get("fiveHourPercent", ""))
PY
)"

          if ! [[ "${value}" =~ ^-?[0-9]+(\.[0-9]+)?$ ]]; then
            echo "Invalid fiveHourPercent value: ${value}"
            exit 1
          fi

          echo "fiveHourPercent=${value}"

          int_value="$(printf "%.0f" "${value}")"

          if [[ "${int_value}" -le 0 || "${int_value}" -ge 100 ]]; then
            echo "Boundary reached (${int_value}). No recurring trigger needed."
            exit 0
          fi

          python - <<'PY'
import os
import smtplib
from email.message import EmailMessage
from datetime import datetime, timezone

username = os.environ["MAIL_USERNAME"]
password = os.environ["MAIL_PASSWORD"]
receive = os.environ["MAIL_RECEIVE"]

now = datetime.now(timezone.utc).isoformat()

msg = EmailMessage()
msg["From"] = username
msg["To"] = receive
msg["Subject"] = f"codex usage trigger [{now}]"
msg.set_content(f"codex usage trigger\ncreated_at: {now}")

server = smtplib.SMTP_SSL("smtp.gmail.com", 465)
server.login(username, password)
server.send_message(msg)
server.quit()
PY
