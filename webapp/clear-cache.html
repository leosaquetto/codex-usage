<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Limpar dados locais - Codex Analytics</title>
    <style>
      * { box-sizing: border-box; }
      body {
        width: min(100%, 520px);
        min-height: 100dvh;
        margin: 0 auto;
        padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
        color: #101828;
        background: #f5f7fb;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      p { margin: 0; color: #667085; font-size: 13px; line-height: 1.4; }
      button {
        width: 100%;
        min-height: 44px;
        margin-top: 18px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: #3b82f6;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
      #status {
        min-height: 46px;
        margin-top: 12px;
        padding: 12px;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 8px;
        color: #344054;
        background: #fff;
        font-size: 12px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <h1>Limpar dados locais</h1>
    <p>Remove cache, Service Worker e preferências deste navegador.</p>
    <button type="button" onclick="clearEverything()">Limpar e recarregar</button>
    <div id="status" role="status">Aguardando.</div>

    <script>
      async function clearEverything() {
        const status = document.getElementById("status");
        status.textContent = "Limpando...";
        try {
          const registrations = "serviceWorker" in navigator
            ? await navigator.serviceWorker.getRegistrations()
            : [];
          await Promise.all(registrations.map((registration) => registration.unregister()));
          const cacheNames = "caches" in window ? await caches.keys() : [];
          await Promise.all(cacheNames.map((name) => caches.delete(name)));
          localStorage.clear();
          sessionStorage.clear();
          status.textContent = "Dados locais removidos. Recarregando...";
          setTimeout(() => {
            window.location.href = `/?nocache=${Date.now()}`;
          }, 500);
        } catch (error) {
          status.textContent = `Falha ao limpar: ${error instanceof Error ? error.message : String(error)}`;
        }
      }
    </script>
  </body>
</html>
