<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#86bdf5" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS full screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- ICONES -->
    <link rel="apple-touch-icon" sizes="180x180" href="/webapp/assets/logo_background.png" />
    <link rel="icon" sizes="192x192" href="/webapp/assets/logo_background.png" />
    <link rel="icon" sizes="512x512" href="/webapp/assets/logo_background.png" />

    <title>Analítica do Codex</title>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="wrap" aria-live="polite">
      <header>
        <div>
          <h1>Analítica do Codex</h1>
          <div class="status" aria-label="Status atual">
            <span id="statusDot" class="dot" aria-hidden="true"></span>
            <span id="statusText">carregando</span>
          </div>
        </div>
        <div class="stamp">
          atualizado<br />
          <span id="updatedAtText">—</span>
        </div>
      </header>

      <section id="errorCard" class="card error-card hidden">
        <div class="label">erro</div>
        <div id="errorText" class="line">não foi possível carregar</div>
      </section>

      <section class="grid two">
        <article class="card">
          <div class="label">limite de 5 horas</div>
          <div class="percent">
            <strong id="fiveHourPercent">—%</strong>
            <span>restante</span>
          </div>
          <div class="bar"><div id="fiveHourBar" class="fill"></div></div>
          <div id="fiveHourLine" class="line">—</div>
        </article>

        <article class="card">
          <div class="label">limite semanal</div>
          <div class="percent">
            <strong id="weeklyPercent">—%</strong>
            <span>restante</span>
          </div>
          <div class="bar"><div id="weeklyBar" class="fill"></div></div>
          <div id="weeklyLine" class="line">—</div>
        </article>
      </section>

      <div class="section-title">ritmo semanal</div>

      <section class="card">
        <div class="metrics">
          <div class="mini">
            <div class="k">média real</div>
            <div id="weeklyAverage" class="v">—</div>
          </div>
          <div class="mini">
            <div class="k">ritmo seguro</div>
            <div id="weeklySafeRate" class="v">—</div>
          </div>
        </div>

        <div class="actions">
          <a class="button" href="shortcuts://run-shortcut?name=Atualizar%20uso%20Codex">atualizar uso</a>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
