<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7fb" />
    <title>Offline - Codex Analytics</title>
    <style>
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100dvh;
        margin: 0;
        padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
        place-items: center;
        color: #101828;
        background: #f5f7fb;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 380px);
        padding: 20px;
        border: 1px solid rgba(15, 23, 42, 0.1);
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.075);
      }
      svg {
        width: 30px;
        height: 30px;
        color: #f97316;
      }
      h1 {
        margin: 12px 0 6px;
        font-size: 21px;
        line-height: 1.1;
      }
      p {
        margin: 0;
        color: #667085;
        font-size: 13px;
        line-height: 1.4;
      }
      button {
        width: 100%;
        min-height: 44px;
        margin-top: 18px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: #3b82f6;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4.9 4.9a10 10 0 0 1 14.2 0M7.8 7.8a6 6 0 0 1 8.4 0M10.6 10.6a2 2 0 0 1 2.8 0M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
      <h1>Sem conexão agora</h1>
      <p>O painel está disponível em cache, mas os limites precisam de rede para atualizar.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
